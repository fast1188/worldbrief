<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldBrief · 世界速览</title>
  <meta name="description" content="中文世界信息聚合仪表盘 — 微博 / 知乎 / 36kr / Hacker News / GitHub / V2EX / 抖音 / B站 / 地震 一屏速览 9 大源" />
  <style>
    :root {
      --bg: #0b0d12;
      --bg-card: #13161e;
      --bg-card-hover: #181c26;
      --border: #232836;
      --text: #e6e9ef;
      --text-dim: #8b92a7;
      --accent: #5eead4;
      --accent-2: #818cf8;
      --danger: #fb7185;
      --warning: #fbbf24;
      --hot-1: #ef4444;
      --hot-2: #f97316;
      --hot-3: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
      flex-wrap: wrap; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      display: grid; place-items: center; font-size: 22px; font-weight: 800; color: #0b0d12;
    }
    h1 { font-size: 22px; font-weight: 700; }
    .tagline { font-size: 12px; color: var(--text-dim); }
    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button, select {
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    button:hover, select:hover { background: var(--bg-card-hover); border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .dot.loading { animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.15s;
      min-height: 200px;
      display: flex; flex-direction: column;
    }
    .card:hover { border-color: var(--accent-2); transform: translateY(-2px); }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-emoji { font-size: 18px; }
    .card-count { font-size: 11px; color: var(--text-dim); }
    .list { list-style: none; flex: 1; overflow-y: auto; max-height: 480px; }
    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 8px; border-radius: 6px; transition: background 0.1s;
      cursor: pointer; text-decoration: none; color: var(--text);
    }
    .item:hover { background: var(--bg-card-hover); }
    .rank {
      flex-shrink: 0; min-width: 22px; height: 22px; border-radius: 4px;
      display: grid; place-items: center; font-size: 11px; font-weight: 700;
      color: #0b0d12; margin-top: 2px;
    }
    .rank.r1 { background: var(--hot-1); }
    .rank.r2 { background: var(--hot-2); }
    .rank.r3 { background: var(--hot-3); }
    .rank.rN { background: var(--border); color: var(--text-dim); }
    .item-body { flex: 1; min-width: 0; }
    .item-title { font-size: 13px; line-height: 1.4; word-wrap: break-word; }
    .item-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .empty, .error {
      padding: 20px; text-align: center; color: var(--text-dim); font-size: 13px;
    }
    .error { color: var(--danger); }
    .skeleton {
      height: 36px; background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%; border-radius: 6px; margin-bottom: 6px;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .footer {
      margin-top: 32px; padding: 24px 0; text-align: center;
      color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .summary {
      font-size: 12px; color: var(--text-dim); font-style: italic;
      padding: 6px 8px; background: rgba(94, 234, 212, 0.05);
      border-left: 2px solid var(--accent); margin-top: 6px; border-radius: 0 4px 4px 0;
    }
    @media (max-width: 600px) {
      body { padding: 10px; }
      h1 { font-size: 18px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">WB</div>
        <div>
          <h1>WorldBrief · 世界速览</h1>
          <div class="tagline">中文世界信息聚合 · 一屏速览 8 大源</div>
        </div>
      </div>
      <div class="controls">
        <div class="status" id="status">
          <span class="dot"></span>
          <span id="status-text">就绪</span>
        </div>
        <select id="ai-source">
          <option value="skillai">AI 摘要: api.skillai.top</option>
          <option value="local">AI 摘要: 关闭</option>
        </select>
        <button id="refresh">刷新</button>
      </div>
    </header>

    <div class="grid" id="grid"></div>

    <div class="footer">
      <p>
        <strong>WorldBrief</strong> · 中文世界信息聚合 ·
        <a href="https://github.com/fast118/worldbrief" target="_blank">GitHub</a> ·
        MIT License
      </p>
      <p style="margin-top: 8px;">
        数据源: 微博 / 知乎 / 36kr / Hacker News / GitHub Trending / V2EX / 抖音 / B站 / 全球地震
      </p>
    </div>
  </div>

  <script>
  // ====== WorldBrief — single-file, no-build, GitHub Pages ready ======
  const PROXY = 'https://api.allorigins.win/raw?url='; // CORS proxy
  const SKILLAI_BASE = 'https://api.skillai.top';      // AI summary endpoint
  const REFRESH_MS = 5 * 60 * 1000;                    // 5 min auto-refresh

  const SOURCES = [
    {
      id: 'wb', emoji: '🔥', name: '微博热搜', limit: 20,
      url: encodeURIComponent('https://weibo.com/ajax/side/hotSearch'),
      transform: (j) => j.data?.realtime?.map((x) => ({
        title: x.note || x.word, url: `https://s.weibo.com/weibo?q=${encodeURIComponent(x.word)}`,
        meta: `${(x.num / 10000).toFixed(0)}万`
      })) || []
    },
    {
      id: 'zhihu', emoji: '💡', name: '知乎热榜', limit: 15,
      url: encodeURIComponent('https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total?limit=15'),
      transform: (j) => j.data?.map((x) => ({
        title: x.target?.title || x.target?.question?.title,
        url: `https://www.zhihu.com/question/${x.target?.id}`,
        meta: `${x.detail_text || ''}`
      })) || []
    },
    {
      id: '36kr', emoji: '📊', name: '36氪热榜', limit: 15,
      url: encodeURIComponent('https://www.36kr.com/hot-list/catalog'),
      transform: (html) => {
        const m = html.match(/window\.__NEXT_DATA__\s*=\s*({.*?})<\/script>/);
        if (!m) return [];
        try {
          const d = JSON.parse(m[1]);
          return (d.props?.initialState?.hotList?.data?.hotList || []).slice(0, 15).map((x) => ({
            title: x.itemTitle || x.title,
            url: `https://www.36kr.com${x.itemUrl || x.url || ''}`,
            meta: x.templateMaterial?.source || ''
          }));
        } catch (e) { return []; }
      }
    },
    {
      id: 'hn', emoji: '🟠', name: 'Hacker News', limit: 20,
      url: encodeURIComponent('https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=20'),
      transform: (j) => (j.hits || []).map((x) => ({
        title: x.title, url: x.url || `https://news.ycombinator.com/item?id=${x.objectID}`,
        meta: `${x.points} 分 · ${x.author} · ${x.num_comments || 0} 评论`
      }))
    },
    {
      id: 'github', emoji: '⭐', name: 'GitHub Trending', limit: 15,
      url: encodeURIComponent('https://github.com/trending'),
      transform: (html) => {
        const items = [];
        const re = /<h2[^>]*>\s*<a[^>]*href="(\/[^"]+)"[^>]*>([\s\S]*?)<\/a>/g;
        let m;
        while ((m = re.exec(html)) && items.length < 15) {
          const path = m[1].replace(/\/blob\/.*/, '');
          const title = m[2].replace(/<[^>]+>/g, '').trim();
          items.push({ title, url: `https://github.com${path}`, meta: 'Trending' });
        }
        return items;
      }
    },
    {
      id: 'bilibili', emoji: '📺', name: 'B站热门', limit: 15,
      url: encodeURIComponent('https://api.bilibili.com/x/web-interface/ranking/v2?rid=0&type=all'),
      transform: (j) => (j.data?.list || []).map((x) => ({
        title: x.title, url: x.short_link || x.link,
        meta: `${(x.stat?.view / 10000).toFixed(0)}万播放`
      }))
    },
    {
      id: 'douyin', emoji: '🎵', name: '抖音热搜', limit: 15,
      url: encodeURIComponent('https://www.iesdouyin.com/web/api/v2/hotsearch/billboard/aweme/'),
      transform: (j) => (j.aweme_list || []).slice(0, 15).map((x) => ({
        title: x.word || x.title, url: `https://www.douyin.com/search/${encodeURIComponent(x.word || x.title)}`,
        meta: `${(x.hot_value / 10000).toFixed(0)}万热度`
      }))
    },
    {
      id: 'v2ex', emoji: '💬', name: 'V2EX 热帖', limit: 15,
      url: encodeURIComponent('https://www.v2ex.com/api/topics/hot.json'),
      transform: (j) => (Array.isArray(j) ? j : []).slice(0, 15).map((x) => ({
        title: x.title, url: x.url || `https://www.v2ex.com/t/${x.id}`,
        meta: `${x.replies || 0} 回复 · ${x.member?.username || ''}`
      }))
    },
    {
      id: 'earthquake', emoji: '🌍', name: '全球地震', limit: 10,
      url: encodeURIComponent('https://www.ceic.ac.cn/ajax/speedsearch?num=10'),
      transform: (j) => (j || []).slice(0, 10).map((x) => ({
        title: `[M${x.M}] ${x.LOCATION || x.place}`,
        url: `https://www.ceic.ac.cn/speedsearch?time=${x.O_TIME}`,
        meta: `${x.EPI_DEPTH || x.depth}km · ${(x.O_TIME || '').slice(0, 16)}`
      }))
    }
  ];

  const grid = document.getElementById('grid');
  const refreshBtn = document.getElementById('refresh');
  const statusText = document.getElementById('status-text');
  const statusDot = document.querySelector('.dot');

  function setStatus(text, loading) {
    statusText.textContent = text;
    statusDot.classList.toggle('loading', !!loading);
  }

  function renderSkeleton() {
    grid.innerHTML = '';
    SOURCES.forEach((s) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title"><span class="card-emoji">${s.emoji}</span>${s.name}</div>
          <div class="card-count">…</div>
        </div>
        <div class="list">${Array(5).fill('<div class="skeleton"></div>').join('')}</div>`;
      grid.appendChild(card);
    });
  }

  function renderItem(s, item, i) {
    const rankClass = i < 3 ? `r${i + 1}` : 'rN';
    return `<a class="item" href="${item.url}" target="_blank" rel="noopener">
      <div class="rank ${rankClass}">${i + 1}</div>
      <div class="item-body">
        <div class="item-title">${escapeHtml(item.title || '')}</div>
        <div class="item-meta">${escapeHtml(item.meta || '')}</div>
      </div>
    </a>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function renderSource(s, items, summary) {
    const card = document.createElement('div');
    card.className = 'card';
    const list = items.length
      ? items.slice(0, s.limit).map((it, i) => renderItem(s, it, i)).join('')
      : '<div class="empty">暂无数据</div>';
    const summaryHtml = summary
      ? `<div class="summary">🤖 ${escapeHtml(summary)}</div>`
      : '';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title"><span class="card-emoji">${s.emoji}</span>${s.name}</div>
        <div class="card-count">${items.length} 条</div>
      </div>
      <div class="list">${list}</div>
      ${summaryHtml}`;
    return card;
  }

  async function fetchSource(s) {
    try {
      const r = await fetch(PROXY + s.url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const ct = r.headers.get('content-type') || '';
      const raw = ct.includes('json') ? await r.json() : await r.text();
      return { ok: true, items: s.transform(raw) || [] };
    } catch (e) {
      return { ok: false, items: [], error: String(e.message || e) };
    }
  }

  async function fetchSummary(items, sourceName) {
    const aiSrc = document.getElementById('ai-source').value;
    if (aiSrc === 'local' || !items.length) return null;
    const top = items.slice(0, 5).map((i, idx) => `${idx + 1}. ${i.title}`).join('; ');
    try {
      const r = await fetch(`${SKILLAI_BASE}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: '你是信息摘要助手。用一句话（30 字内）总结这组热点的核心趋势。直接输出总结，不要加前缀。' },
            { role: 'user', content: `【${sourceName}】前 5 条: ${top}` }
          ],
          max_tokens: 80
        })
      });
      if (!r.ok) return null;
      const j = await r.json();
      return j.choices?.[0]?.message?.content?.trim() || null;
    } catch (e) {
      return null;
    }
  }

  async function refresh() {
    refreshBtn.disabled = true;
    setStatus('加载中…', true);
    renderSkeleton();

    const results = await Promise.all(SOURCES.map(async (s) => {
      const r = await fetchSource(s);
      return { source: s, ...r };
    }));

    // Clear skeleton, then render all
    grid.innerHTML = '';
    results.forEach((r) => {
      const card = r.ok && r.items.length
        ? renderSource(r.source, r.items)
        : renderError(r.source, r.error);
      grid.appendChild(card);
    });

    // Fire AI summaries in background (non-blocking)
    const aiSrc = document.getElementById('ai-source').value;
    if (aiSrc === 'skillai') {
      results.forEach(async (r, idx) => {
        if (r.ok && r.items.length) {
          const s = await fetchSummary(r.items, r.source.name);
          if (s) {
            const card = grid.children[idx];
            const sum = document.createElement('div');
            sum.className = 'summary';
            sum.textContent = '🤖 ' + s;
            card.appendChild(sum);
          }
        }
      });
    }

    setStatus(`已更新 ${new Date().toLocaleTimeString('zh-CN')}`, false);
    refreshBtn.disabled = false;
  }

  function renderError(s, err) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title"><span class="card-emoji">${s.emoji}</span>${s.name}</div>
        <div class="card-count">⚠ 失败</div>
      </div>
      <div class="error">加载失败: ${escapeHtml(err || '未知错误')}</div>
      <div style="margin-top: 8px; font-size: 11px; color: var(--text-dim);">
        可换源 / 自建代理后重试
      </div>`;
    return card;
  }

  refreshBtn.addEventListener('click', refresh);
  document.getElementById('ai-source').addEventListener('change', refresh);

  // First load + auto refresh
  refresh();
  setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
